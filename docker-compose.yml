version: "3.9"

services:
  traefik:
    image: traefik:v3.0
    container_name: edgecontrol-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${COMPOSE_PROJECT_NAME:-edgecontrol}_internal"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: edgecontrol-api
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      TRAEFIK_DYNAMIC_CONFIG_PATH: /traefik-config/dynamic.yml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-10000}
      LATENCY_WARN_MS: ${LATENCY_WARN_MS:-800}
      LATENCY_CRIT_MS: ${LATENCY_CRIT_MS:-2000}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-3}
      PROMETHEUS_FILE_SD_PATH: /prometheus-sd/edgecontrol-services.json
      PROMETHEUS_RELOAD_URL: http://prometheus:9090/-/reload
    volumes:
      - ./docker/traefik:/traefik-config
      - ./docker/prometheus/file_sd:/prometheus-sd
    depends_on:
      - db
      - redis
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/worker/standalone-worker.js"]
    container_name: edgecontrol-worker
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TRAEFIK_DYNAMIC_CONFIG_PATH: /traefik-config/dynamic.yml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-10000}
      LATENCY_WARN_MS: ${LATENCY_WARN_MS:-800}
      LATENCY_CRIT_MS: ${LATENCY_CRIT_MS:-2000}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-3}
    volumes:
      - ./docker/traefik:/traefik-config
    depends_on:
      - db
      - redis
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: edgecontrol-web
    depends_on:
      - api
    networks:
      - internal
    environment:
      VITE_API_URL: http://api:3000

  db:
    image: postgres:16-alpine
    container_name: edgecontrol-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: edgecontrol
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d edgecontrol"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: edgecontrol-redis
    networks:
      - internal

  # Prisma one-offs — same context as API, `target: builder` (workspace + node_modules).
  # Not started by default (`profiles`). Used by scripts/setup.sh (db|seed|full without host pnpm).
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    profiles:
      - migrate
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # S3-compatible API (:9000) and console (:9001). Keep replicas at 1 for this
  # single-node layout; use Swarm/Kubernetes for horizontal MinIO clusters.
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      # Public HTTPS URLs (must match Traefik Host rules below; required for console + S3 signing behind TLS)
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:?Set MINIO_SERVER_URL e.g. https://s3.example.com}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:?Set MINIO_BROWSER_REDIRECT_URL e.g. https://minio.example.com}
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${COMPOSE_PROJECT_NAME:-edgecontrol}_internal"
      - "traefik.http.routers.minio-s3.rule=Host(`${MINIO_S3_DOMAIN}`)"
      - "traefik.http.routers.minio-s3.entrypoints=websecure"
      - "traefik.http.routers.minio-s3.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-s3.service=minio-s3"
      - "traefik.http.services.minio-s3.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:9000/minio/health/live",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$${MINIO_BUCKET:-edgecontrol}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-edgecontrol}
    networks:
      - internal
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: edgecontrol-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/file_sd:/etc/prometheus/file_sd:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.1
    container_name: edgecontrol-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3010}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - internal
    ports:
      - "3010:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  letsencrypt:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  public:
    external: true
  internal:
    internal: true
