services:
  traefik:
    image: traefik:v3.6
    container_name: edgecontrol-traefik
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      # Let's Encrypt rejects an empty contact; derive admin@<BASE_DOMAIN> when ACME_EMAIL is unset/blank in .env.
      ACME_EMAIL: ${ACME_EMAIL:-admin@${BASE_DOMAIN:-example.com}}
      # Optional TRAEFIK_DOCKER_NETWORK + docker-compose.proxy.yml — README (Docker Compose).
      DOCKER_INTERNAL_NETWORK: ${TRAEFIK_DOCKER_NETWORK:-${COMPOSE_PROJECT_NAME:-edgecontrol}_internal}
      DOCKER_API_VERSION: "1.47"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.d:/etc/traefik/dynamic.d
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: edgecontrol-api
    ports:
      - "127.0.0.1:${API_PUBLISH_PORT:-3001}:3000"
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:${PANEL_PUBLISH_PORT:-8080}}
      TRAEFIK_DYNAMIC_CONFIG_PATH: /traefik-config/dynamic.d/01-managed.yml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-10000}
      LATENCY_WARN_MS: ${LATENCY_WARN_MS:-800}
      LATENCY_CRIT_MS: ${LATENCY_CRIT_MS:-2000}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-3}
      PROMETHEUS_FILE_SD_PATH: /prometheus-sd/edgecontrol-services.json
      PROMETHEUS_RELOAD_URL: http://prometheus:9090/-/reload
    volumes:
      - ./docker/traefik:/traefik-config
      - ./docker/prometheus/file_sd:/prometheus-sd
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["./node_modules/.bin/tsx", "src/worker/standalone-worker.ts"]
    container_name: edgecontrol-worker
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      TRAEFIK_DYNAMIC_CONFIG_PATH: /traefik-config/dynamic.d/01-managed.yml
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-10000}
      LATENCY_WARN_MS: ${LATENCY_WARN_MS:-800}
      LATENCY_CRIT_MS: ${LATENCY_CRIT_MS:-2000}
      MAX_CONSECUTIVE_FAILURES: ${MAX_CONSECUTIVE_FAILURES:-3}
    volumes:
      - ./docker/traefik:/traefik-config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: edgecontrol-web
    # Panel HTTPS is defined in docker/traefik/dynamic.d/00-static.yml (render from .env — no Docker labels).
    ports:
      - "127.0.0.1:${PANEL_PUBLISH_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: edgecontrol-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: edgecontrol
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d edgecontrol"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: edgecontrol-redis
    networks:
      - internal

  # Prisma one-offs — same context as API, `target: builder` (workspace + node_modules).
  # Not started by default (`profiles`). Used by scripts/setup.sh (db|seed|full without host pnpm).
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    profiles:
      - migrate
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD}@db:5432/edgecontrol
      BASE_DOMAIN: ${BASE_DOMAIN:-example.com}
      RBAC_SEED_PASSWORD: ${RBAC_SEED_PASSWORD:-ChangeMe123456!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RBAC_SUPER_ADMIN_EMAIL: ${RBAC_SUPER_ADMIN_EMAIL:-}
      RBAC_SUPER_ADMIN_PASSWORD: ${RBAC_SUPER_ADMIN_PASSWORD:-}
      RBAC_ADMIN_EMAIL: ${RBAC_ADMIN_EMAIL:-}
      RBAC_ADMIN_PASSWORD: ${RBAC_ADMIN_PASSWORD:-}
      RBAC_DEVELOPER_EMAIL: ${RBAC_DEVELOPER_EMAIL:-}
      RBAC_DEVELOPER_PASSWORD: ${RBAC_DEVELOPER_PASSWORD:-}
      RBAC_VIEWER_EMAIL: ${RBAC_VIEWER_EMAIL:-}
      RBAC_VIEWER_PASSWORD: ${RBAC_VIEWER_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # MinIO — S3 API :9000 + console :9001 on loopback (VPS/local or ssh -L 9000:127.0.0.1:9000 …).
  minio:
    image: minio/minio:latest
    container_name: edgecontrol-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      # Defaults match Traefik Host() (BASE_DOMAIN / MINIO_*_HOST). Override with MINIO_BROWSER_REDIRECT_URL / MINIO_SERVER_URL if needed.
      MINIO_BROWSER_REDIRECT_URL: "${MINIO_BROWSER_REDIRECT_URL:-https://${MINIO_CONSOLE_HOST:-minio.${BASE_DOMAIN}}}"
      MINIO_SERVER_URL: "${MINIO_SERVER_URL:-https://${MINIO_API_HOST:-s3.${BASE_DOMAIN}}}"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    # MinIO HTTPS hosts are in docker/traefik/dynamic.d/00-static.yml (render from .env — no Docker labels).
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$${MINIO_BUCKET:-edgecontrol}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-edgecontrol}
    networks:
      - internal
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: edgecontrol-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/file_sd:/etc/prometheus/file_sd:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.1
    container_name: edgecontrol-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3010}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - internal
    ports:
      - "3010:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  letsencrypt:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  public:
    external: true
  internal:
    internal: true
