http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
  routers:
    edgecontrol-panel-http:
      rule: Host(`edgecontrol.example.com`)
      entryPoints:
        - web
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    edgecontrol-minio-s3-http:
      rule: Host(`s3.example.com`)
      entryPoints:
        - web
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    edgecontrol-minio-console-http:
      rule: Host(`minio.example.com`)
      entryPoints:
        - web
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    edgecontrol-panel:
      rule: Host(`edgecontrol.example.com`)
      entryPoints:
        - websecure
      priority: 1
      service: edgecontrol-panel-svc
    edgecontrol-minio-s3:
      rule: Host(`s3.example.com`)
      entryPoints:
        - websecure
      priority: 1
      service: edgecontrol-minio-s3-svc
    edgecontrol-minio-console:
      rule: Host(`minio.example.com`)
      entryPoints:
        - websecure
      priority: 1
      service: edgecontrol-minio-console-svc
  services:
    edgecontrol-panel-svc:
      loadBalancer:
        servers:
          - url: http://web:80
    edgecontrol-minio-s3-svc:
      loadBalancer:
        servers:
          - url: http://minio:9000
    edgecontrol-minio-console-svc:
      loadBalancer:
        servers:
          - url: http://minio:9001
