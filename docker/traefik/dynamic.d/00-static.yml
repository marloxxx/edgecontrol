http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
  routers:
    edgecontrol-minio-s3-http:
      rule: Host(`s3.example.com`)
      entryPoints:
        - web
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    edgecontrol-minio-console-http:
      rule: Host(`minio.example.com`)
      entryPoints:
        - web
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    edgecontrol-minio-s3:
      rule: Host(`s3.example.com`)
      entryPoints:
        - websecure
      priority: 1
      service: edgecontrol-minio-s3-svc
      tls:
        certResolver: letsencrypt
    edgecontrol-minio-console:
      rule: Host(`minio.example.com`)
      entryPoints:
        - websecure
      priority: 1
      service: edgecontrol-minio-console-svc
      tls:
        certResolver: letsencrypt
  services:
    edgecontrol-minio-s3-svc:
      loadBalancer:
        servers:
          - url: http://minio:9000
    edgecontrol-minio-console-svc:
      loadBalancer:
        servers:
          - url: http://minio:9001
