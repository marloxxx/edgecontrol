# Generated by edgecontrol
http:
  routers:
    panel-web:
      rule: "Host(`panel.domain.com`)"
      service: panel-web
      entryPoints: [websecure]
      tls:
        certResolver: letsencrypt

    api-service:
      rule: "Host(`api.domain.com`)"
      service: api-service
      entryPoints: [websecure]
      tls:
        certResolver: letsencrypt

  services:
    panel-web:
      loadBalancer:
        servers:
          - url: "http://10.0.0.2:80"

    api-service:
      loadBalancer:
        servers:
          - url: "http://10.0.0.3:3000"
        healthCheck:
          path: /api/health
          interval: 10s
          timeout: 3s
