# Traefik static configuration (read-only in the container). Routes come only from `providers.file` → `dynamic.d/`.
global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: false

log:
  level: INFO

providers:
  file:
    directory: /etc/traefik/dynamic.d
    watch: true

entryPoints:
  # HTTP-01 uses this entrypoint. Do not set `allowACMEByPass: true` here unless you deliberately override
  # challenge handling—otherwise internal ACME keeps MaxInt priority and wins over other :80 routers.
  web:
    address: ":80"
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
