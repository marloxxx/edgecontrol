# Traefik static configuration (read-only in the container).
# Dynamic HTTP routes live in dynamic.yml (written by the API). ACME_EMAIL is supplied via container env.
global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: false

log:
  level: INFO

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL}
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
