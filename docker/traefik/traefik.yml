# Traefik static configuration (read-only in the container). Routes come only from `providers.file` → `dynamic.d/`.
global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: false

log:
  level: INFO

providers:
  file:
    directory: /etc/traefik/dynamic.d
    watch: true

entryPoints:
  # HTTP-01 uses this entrypoint. Do not set `allowACMEByPass: true` here unless you deliberately override
  # challenge handling—otherwise internal ACME keeps MaxInt priority and wins over other :80 routers.
  web:
    address: ":80"
  websecure:
    address: ":443"

# Default TLS material (mount ./docker/traefik/ssl → /etc/traefik/ssl). Run scripts/ensure-traefik-ssl.sh if missing.
# Routers with tls.certResolver still obtain Let’s Encrypt certs; this default covers fallbacks / local dev.
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/ssl/cert.pem
        keyFile: /etc/traefik/ssl/key.pem

certificatesResolvers:
  letsencrypt:
    acme:
      # `caServer` + contact email are set from docker-compose (CLI) so `.env` controls prod vs staging without editing this file.
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
