# Traefik static configuration (read-only in the container).
# Both providers must live here: when using --configFile, CLI --providers.docker flags are ignored if
# the static file already defines `providers` (file-only → no Docker routers → 404 on labelled hosts).
# Set DOCKER_INTERNAL_NETWORK on the container (compose interpolates COMPOSE_PROJECT_NAME → e.g. edgecontrol_internal).
global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: false

log:
  level: INFO

providers:
  file:
    # Panel + MinIO: 00-static.yml (render from .env). UI-managed routes: 01-managed.yml (API).
    directory: /etc/traefik/dynamic.d
    watch: true
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: ${DOCKER_INTERNAL_NETWORK}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
